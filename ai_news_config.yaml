  hackernews:
    enabled: true
    min_score: 80
    keywords: [AI, agent, LLM, OpenAI, Anthropic, Claude, Copilot, Gemini, MCP]

push:
  # 凭证支持「环境变量优先」: 留空 webhook/secret/password,
  # 改填 webhook_env 等指向的环境变量名, 即可避免明文入库.
  # 若同时填了明文和 env 名, 优先用明文.
  feishu:
    enabled: false
    webhook: ""
    webhook_env: FEISHU_WEBHOOK
    secret: ""
    secret_env: FEISHU_SECRET
  wechat_work:
    enabled: true
    webhook: ""
    webhook_env: WECOM_WEBHOOK
  dingtalk:
    enabled: false
    webhook: ""
    webhook_env: DINGTALK_WEBHOOK
    secret: ""
    secret_env: DINGTALK_SECRET
  email:
    enabled: false
    smtp_host: smtp.example.com
    smtp_port: 465
    use_ssl: true
    username: you@example.com
    password: ""
    password_env: SMTP_PASSWORD
    from_addr: you@example.com
    to_addrs: [team@example.com]

delivery:
  max_items: 12
  min_value_score: 6
  recent_hours: 48
  llm_max_candidates: 80
  llm_batch_size: 12
  dedup_store: ./data/pushed.json
  digest_title: "AI / Agent 每日情报"
  summary_style: "面向企业 AI 产品经理、研究员和管理层，突出今天新增变化、企业影响、可验证来源和建议动作。不要在正文显示评分。"

dashboard:
  output: ./data/dashboard-news.json
  window_label: "最近 96 小时实时采集"
  refresh_minutes: 60
  next_run: "1 小时后"
