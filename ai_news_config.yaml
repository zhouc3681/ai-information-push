# AI 情报雷达真实推送配置
# 先执行 dry-run 预览，不会真实推送：
#   python ai-agent-news-push/scripts/dashboard_bridge.py --config ai_news_config.yaml --dry-run
#
# 确认内容后真实推送：
#   python ai-agent-news-push/scripts/dashboard_bridge.py --config ai_news_config.yaml --push

llm:
  base_url_env: AI_GATEWAY_BASE_URL
  api_key_env: AI_GATEWAY_API_KEY
  base_url_suffix: /api/v1
  model: anthropic/claude-haiku-4.5
  max_tokens: 8192

keywords_include:
  # 英文 / 通用
  - AI Agent
  - Agentic
  - agents
  - agent
  - LLM
  - OpenAI
  - Anthropic
  - Claude
  - Copilot
  - Gemini
  - MCP
  - LangGraph
  - enterprise AI
  - benchmark
  - workflow
  - enterprise
  # 中文通用
  - 智能体
  - 大模型
  - 大语言模型
  - 企业 AI
  - 自动化
  - AGI
  # 国产模型 / 厂商
  - 通义千问
  - Qwen
  - 文心
  - DeepSeek
  - 深度求索
  - Kimi
  - 月之暗面
  - 智谱
  - ChatGLM
  - GLM
  - 豆包
  - 百川
  - Baichuan
  - MiniMax
  - 书生
  - 浦语
  - InternLM
  - 飞桨
  - PaddlePaddle
  - 阿里
  - 字节
  - 腾讯
  - 百度
  - 华为
  # 国产应用
  - Coze
  - Dify
  - 扣子

keywords_exclude:
  - AI Art
  - image generation
  - 绘画
  - 壁纸

sources:
  # 没有 RSS 的高价值官方页/发布说明，可作为固定监控对象。
  # 首次推送后会进入 pushed.json，后续不会重复刷屏。
  pages:
    - name: OpenAI Enterprise Release Notes
      title: ChatGPT Enterprise & Edu 发布说明：Workspace Agents、Codex 与应用模板更新
      url: https://help.openai.com/en/articles/10128477-chatgpt-enterprise-i-edu-informacje-o-wersjach
      published: 2026-05-28
      summary: ChatGPT Enterprise / Edu 发布说明，覆盖 Workspace Agents、Codex、应用模板等企业功能更新。
    - name: OpenAI Workspace Agents
      title: OpenAI 发布 Workspace Agents
      url: https://openai.com/index/introducing-workspace-agents-in-chatgpt/
      published: 2026-04-22
      summary: OpenAI 发布团队级 Workspace Agents，面向企业共享工作流和 Slack 场景。
    - name: ServiceNow Knowledge 2026
      title: ServiceNow Knowledge 2026：AI Control Tower 与企业 Agent 治理
      url: https://newsroom.servicenow.com/press-releases/details/2026/ServiceNow-turns-enterprise-AI-chaos-into-control-with-the-platform-for-governed-autonomous-work/default.aspx
      published: 2026-05-05
      summary: ServiceNow AI Control Tower、AI Specialists、Action Fabric 等企业 Agent 治理更新。
    - name: Workspace-Bench 1.0
      title: Workspace-Bench 1.0：复杂办公空间 Agent 评测
      url: https://arxiv.org/abs/2605.03596
      published: 2026-05-14
      summary: 评测 AI Agent 在复杂办公空间任务中的表现。
    # —— 海外架构演进固定监控 ——
    - name: Anthropic Building Effective Agents
      title: Anthropic《Building Effective Agents》构建高效智能体指南
      url: https://www.anthropic.com/research/building-effective-agents
      published: 2026-01-01
      summary: Anthropic 官方对 Agent 架构（Workflow vs Agent）的务实拆解，全网公认的 Agent 开发指南。
    - name: Hugging Face smolagents Docs
      title: Hugging Face smolagents 框架文档
      url: https://huggingface.co/docs/smolagents
      published: 2026-01-01
      summary: Hugging Face 推出的极简 Code Agent 框架，文档与社区是学习「代码型 Agent」的最佳入口。
    # —— 国内 Agent 落地与社区固定监控 ——
    - name: Way to AGI 知识库
      title: Way to AGI：国内规模最大的 AGI 社区与 Agent 知识库
      url: https://waytoagi.com
      published: 2026-01-01
      summary: 知识库中有专门的 Agent 核心原理与 Coze / Dify 等主流平台的硬核教程。
    - name: Dify 官方
      title: Dify：国内主流 Agent 工作流编排平台
      url: https://dify.ai
      published: 2026-01-01
      summary: 看一线开发者用 Workflow 搓出高级 Agent 的真实报错、调优与实战案例。

